name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4.3.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Diagnose files before Tauri build
        shell: pwsh
        run: |
          Write-Host "Starting Tauri Windows build from $PWD"
          Write-Host "Existing bundle files:"
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Force |
              Select-Object FullName, Length
          } else {
            Write-Host "src-tauri/target/release/bundle does not exist yet (expected before build)."
          }

      - name: Generate placeholder Tauri icons
        run: node scripts/generate-ci-icons.mjs

      - name: Run Tauri Windows build
        run: npm run tauri:build -- --bundles nsis

      - name: Diagnose files after Tauri build
        shell: pwsh
        run: |
          Write-Host "Tauri build completed. Generated bundle files:"
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Force |
              Select-Object FullName, Length
          } else {
            Write-Error "Tauri completed without creating src-tauri/target/release/bundle."
          }

      - name: Normalize Windows installers
        run: npm run normalize:windows

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: clarity-loop-windows-installers
          path: dist/windows/ClarityLoopSetup.exe
          if-no-files-found: error
          retention-days: 14
